version: '3.8'

services:
  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-nova-in-out-auth-api
    restart: always
    env_file:
      - .env
    ports:
      - "5013:5013"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
